name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    # Run on all pull requests, regardless of target branch

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pcg-server

jobs:
  changes:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          rust:
            - '**/*.rs'
            - '**/Cargo.toml'
            - '**/Cargo.lock'
            - 'rust-toolchain'

  check_warnings:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-check-
    - name: Check for warnings
      env:
        RUSTFLAGS: "-D warnings"
      run: cargo check --all-targets --lib --bins --tests --examples --benches --message-format=json

  clippy:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-clippy-
    - name: Run Clippy
      run: cargo clippy -- -D warnings

  rustfmt:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Check code formatting
      run: cargo fmt --all -- --check

  tests:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-test-
    - name: Run unit tests and pcg-tests with coverage
      run: ./scripts/coverage.sh --html
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/html/

  pcg_server_tests:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-server-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-server-
    - name: Build pcg-bin (required by pcg-server)
      run: cd pcg-bin && cargo build --release
    - name: Check pcg-server for dead code and other warnings
      env:
        RUSTFLAGS: "-D warnings"
      run: cd pcg-server && cargo check --all-targets
    - name: Run pcg-server tests
      run: cd pcg-server && cargo test

  build_2025_07_21:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build2025-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build2025-
    - name: Build using Rust Nightly 2025-07-21
      run: cp rust-toolchain-2025-07-21 rust-toolchain && cargo build --no-default-features

  doc_tests:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-doc-
    - name: Run unit tests
      run: cargo test -p pcg --doc

  check_generated_types:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    container: ${{ fromJSON(vars.CONTAINER || 'null') }}
    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-typegen-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-typegen-
    - name: Generate TypeScript types
      run: cargo test
    - name: Check generated types are up-to-date
      run: |
        if ! git diff --exit-code visualization/src/generated_types/; then
          echo "ERROR: Generated TypeScript types are out of date."
          echo "Run 'cargo test' to regenerate them."
          exit 1
        fi

  build_visualization:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: visualization/package-lock.json

    - name: Install web visualization dependencies
      working-directory: visualization
      run: npm ci

    - name: Check for deprecated packages
      working-directory: visualization
      run: npm run check-deprecated

    - name: Check for unused .tsx files
      working-directory: visualization
      run: npm run check-unused

    - name: Lint TypeScript/JavaScript code
      working-directory: visualization
      run: npm run lint

    - name: Build web visualization
      working-directory: visualization
      run: npm run build

  build_docker:
    if: github.repository_owner == 'prusti'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
